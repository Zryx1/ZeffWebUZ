<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>The Vortex | Zeff</title>

    <!-- Fonts (satu weight range, biar lebih ringan) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100dvh;
            background: #0a0612;
            position: relative;
            overflow-x: hidden;
        }

        /* ========== BACKGROUND RINGAN (statis, tanpa animasi berat) ========== */
        .custom-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(ellipse 60% 50% at 25% 20%, rgba(124, 58, 237, 0.18), transparent 60%),
                radial-gradient(ellipse 55% 45% at 80% 75%, rgba(168, 85, 247, 0.14), transparent 60%),
                linear-gradient(160deg, #0a0612 0%, #140b1f 45%, #16101f 100%);
        }

        /* Bintang statis dibuat lewat CSS gradient dots, tanpa DOM/JS berat */
        .stars-smooth {
            position: fixed;
            inset: 0;
            z-index: 0;
            opacity: 0.5;
            background-image:
                radial-gradient(1.5px 1.5px at 20% 30%, #fff, transparent),
                radial-gradient(1.5px 1.5px at 65% 15%, #fff, transparent),
                radial-gradient(1px 1px at 85% 40%, #fff, transparent),
                radial-gradient(1.5px 1.5px at 10% 70%, #fff, transparent),
                radial-gradient(1px 1px at 40% 85%, #fff, transparent),
                radial-gradient(1.5px 1.5px at 92% 80%, #fff, transparent),
                radial-gradient(1px 1px at 55% 55%, #fff, transparent),
                radial-gradient(1.5px 1.5px at 75% 25%, #fff, transparent);
            background-repeat: repeat;
            background-size: 100% 100%;
            animation: twinkle 6s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.35; }
            50% { opacity: 0.65; }
        }

        /* Satu ring dekoratif saja, ringan (hanya transform, no box-shadow animation) */
        .smooth-ring {
            position: fixed;
            top: 50%;
            left: 50%;
            width: min(80vw, 640px);
            height: min(80vw, 640px);
            transform: translate(-50%, -50%);
            border-radius: 50%;
            border: 1px solid rgba(124, 58, 237, 0.12);
            z-index: 0;
            pointer-events: none;
        }

        .container {
            width: 100%;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 2;
            padding: 0;
        }

        .profile-card {
            width: 100%;
            max-width: 560px;
            min-height: 100dvh;
            background: rgba(19, 17, 28, 0.55);
            backdrop-filter: blur(10px);
            border-radius: 0;
            padding: clamp(24px, 6vw, 44px) clamp(18px, 5vw, 36px);
            border: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        @media (min-width: 640px) {
            body {
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 24px;
            }
            .container {
                min-height: auto;
                max-height: 96vh;
            }
            .profile-card {
                min-height: auto;
                max-height: 96vh;
                overflow-y: auto;
                border-radius: 32px;
                border: 1px solid rgba(124, 58, 237, 0.4);
                box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
                scrollbar-width: thin;
                scrollbar-color: rgba(124,58,237,0.5) transparent;
            }
            .profile-card::-webkit-scrollbar { width: 6px; }
            .profile-card::-webkit-scrollbar-thumb { background: rgba(124,58,237,0.5); border-radius: 10px; }
        }

        /* VIDEO SECTION */
        .video-section {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 22px;
            overflow: hidden;
            margin-bottom: 22px;
            border: 2px solid #7c3aed;
            position: relative;
            cursor: pointer;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.5);
        }

        .video-section:active {
            transform: scale(0.995);
        }

        .video-section video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s ease;
            pointer-events: none;
        }

        .video-section:hover .video-overlay {
            opacity: 1;
        }

        .video-overlay i {
            color: white;
            font-size: 2.6rem;
            text-shadow: 0 2px 8px black;
        }

        .sound-btn {
            position: absolute;
            bottom: 12px;
            right: 12px;
            background: rgba(0, 0, 0, 0.65);
            border: 1px solid rgba(124, 58, 237, 0.6);
            border-radius: 40px;
            padding: 8px 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            z-index: 10;
            transition: background 0.2s ease, border-color 0.2s ease;
            font-size: 0.8rem;
            font-weight: 500;
            color: #c4b5fd;
        }

        .sound-btn:hover {
            background: #7c3aed;
            border-color: #c084fc;
            color: white;
        }

        .sound-btn i { font-size: 0.9rem; }
        .sound-btn span { font-size: 0.7rem; letter-spacing: 0.5px; }

        .muted-indicator {
            position: absolute;
            bottom: 12px;
            left: 12px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 20px;
            padding: 4px 8px;
            font-size: 0.6rem;
            color: #f87171;
            display: flex;
            align-items: center;
            gap: 4px;
            pointer-events: none;
        }

        .profile-photo-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 18px;
        }

        .profile-photo {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid #7c3aed;
            box-shadow: 0 0 26px rgba(124, 58, 237, 0.55), 0 5px 15px rgba(0,0,0,0.3);
            background: #1e1a2f;
        }

        .profile-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-info {
            text-align: center;
            margin-bottom: 18px;
        }

        .name {
            color: white;
            font-size: clamp(1.9rem, 6vw, 2.4rem);
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff, #c4b5fd);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .bio {
            color: #ddd6fe;
            font-size: 1rem;
            line-height: 1.5;
            max-width: 350px;
            margin: 0 auto;
            font-weight: 500;
            background: rgba(0,0,0,0.25);
            display: inline-block;
            padding: 6px 18px;
            border-radius: 60px;
        }

        .bio i { color: #c084fc; margin: 0 6px; }

        .info-ai {
            text-align: center;
            margin-bottom: 24px;
            padding: 0 8px;
        }

        .info-badge {
            background: linear-gradient(135deg, rgba(124, 58, 237, 0.2), rgba(168, 85, 247, 0.2));
            border: 1px solid rgba(124, 58, 237, 0.4);
            border-radius: 40px;
            padding: 10px 20px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .info-badge i { font-size: 1.1rem; color: #c084fc; }

        .info-badge span {
            font-size: 0.82rem;
            color: #c4b5fd;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        .date-menu {
            background: rgba(26, 23, 40, 0.6);
            border: 1px solid rgba(124, 58, 237, 0.5);
            border-radius: 28px;
            padding: 22px;
            margin-bottom: 24px;
            text-align: center;
        }

        .day-section {
            margin-bottom: 18px;
            padding-bottom: 18px;
            border-bottom: 1px solid rgba(124, 58, 237, 0.35);
        }

        .day-label {
            color: #c084fc;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-weight: 600;
        }

        .day-name {
            color: white;
            font-size: clamp(1.9rem, 6vw, 2.5rem);
            font-weight: 800;
            line-height: 1.2;
            letter-spacing: -0.5px;
        }

        .date-section {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 18px;
            flex-wrap: wrap;
        }

        .date-box {
            background: rgba(19, 17, 28, 0.8);
            border-radius: 24px;
            padding: 16px 20px;
            min-width: 100px;
            border: 1px solid #3b2c5c;
        }

        .date-number {
            color: #c084fc;
            font-size: 2.1rem;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 6px;
        }

        .date-month {
            color: #cbd5e6;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 500;
        }

        .date-year {
            color: white;
            font-size: 1.7rem;
            font-weight: 700;
            padding: 8px 18px;
            border-radius: 40px;
            background: rgba(0,0,0,0.2);
        }

        .web-section {
            background: rgba(26, 23, 40, 0.55);
            border: 1px solid rgba(124, 58, 237, 0.5);
            border-radius: 28px;
            padding: 22px;
            margin-bottom: 20px;
        }

        .web-header {
            text-align: center;
            color: #c084fc;
            font-size: 0.82rem;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            margin-bottom: 18px;
            font-weight: 600;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .web-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(105deg, rgba(124, 58, 237, 0.9) 0%, rgba(168, 85, 247, 0.9) 100%);
            border: none;
            padding: 14px 20px;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 12px rgba(124, 58, 237, 0.3);
            text-decoration: none;
            width: 100%;
        }

        .web-btn .btn-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            overflow: hidden;
        }

        .web-btn .btn-left i {
            font-size: 1.2rem;
            width: 24px;
            text-align: center;
            flex-shrink: 0;
        }

        .web-btn .btn-left span {
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .web-btn .btn-arrow {
            opacity: 0.7;
            transition: transform 0.2s;
            flex-shrink: 0;
        }

        .web-btn:hover {
            transform: translateX(4px);
            box-shadow: 0 8px 20px rgba(124, 58, 237, 0.5);
        }

        .web-btn:hover .btn-arrow { transform: translateX(4px); opacity: 1; }

        .loading-links {
            text-align: center;
            padding: 26px;
            color: #b9b0d4;
        }

        .loading-links i {
            font-size: 1.8rem;
            margin-bottom: 10px;
            display: block;
        }

        .error-links {
            text-align: center;
            padding: 20px;
            color: #f87171;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
        }

        .info-text {
            font-size: 0.7rem;
            color: #9b8ec7;
            text-align: center;
            margin-top: 15px;
            padding-top: 12px;
            border-top: 1px solid rgba(124, 58, 237, 0.3);
        }

        .footer {
            display: flex;
            justify-content: center;
            margin-top: 4px;
            padding-top: 10px;
            border-top: 1px solid rgba(124, 58, 237, 0.4);
        }

        .footer-link {
            color: #c4b5fd;
            font-size: 1rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(0,0,0,0.3);
            padding: 8px 22px;
            border-radius: 40px;
            transition: transform 0.2s, background 0.2s, border-color 0.2s;
            font-weight: 500;
            border: 1px solid #4a3a7a;
        }

        .footer-link:hover {
            color: white;
            background: #7c3aedcc;
            border-color: #c084fc;
            transform: translateY(-2px);
        }

        @media (prefers-reduced-motion: reduce) {
            .stars-smooth { animation: none; }
        }

        @media (max-width: 420px) {
            .name { font-size: 1.9rem; }
            .bio { font-size: 0.88rem; }
            .profile-photo { width: 90px; height: 90px; }
            .day-name { font-size: 2rem; }
            .date-number { font-size: 1.7rem; }
            .date-year { font-size: 1.25rem; padding: 5px 12px; }
            .date-box { padding: 12px 14px; min-width: 85px; }
            .web-btn { padding: 12px 16px; font-size: 0.9rem; }
            .web-btn .btn-left span { font-size: 0.85rem; white-space: normal; word-break: break-word; }
            .info-badge span { font-size: 0.75rem; }
            .sound-btn span { display: none; }
        }

        video::-webkit-media-controls { display: none !important; }
        video { pointer-events: none; }
    </style>
</head>
<body>

    <div class="custom-bg"></div>
    <div class="stars-smooth"></div>
    <div class="smooth-ring"></div>

    <div class="container">
        <div class="profile-card">
            <!-- VIDEO SECTION -->
            <div class="video-section" id="videoSection">
                <video id="profileVideo" loop playsinline preload="metadata">

            <!-- PROFILE PHOTO -->
            <div class="profile-photo-wrapper">
                <div class="profile-photo">
                    <img src="https://raw.githubusercontent.com/Zryx1/TesHtmlZeff/refs/heads/main/IMG_20260214_125718.jpg"
                         alt="Zeff Profile"
                         loading="lazy"
                         onerror="this.src='https://placehold.co/400x400/2d1b4e/white?text=ZEFF'">
                </div>
            </div>

            <div class="profile-info">
                <h1 class="name">𝐙𝐄𝐅𝐅</h1>
                <p class="bio">
                    <i class="fas fa-star"></i>
                    𝙿𝚛𝚘𝚓𝚎𝚌𝚝 𝙱𝚢 𝚉𝚎𝚏𝚏
                    <i class="fas fa-star"></i>
                </p>
            </div>

            <div class="info-ai">
                <div class="info-badge">
                    <i class="fas fa-moon"></i>
                    <span>Zeff Hanya Pengguna AI Biasa - Dia Hanya Memikirkan Ide</span>
                    <i class="fas fa-moon"></i>
                </div>
            </div>

            <div class="date-menu">
                <div class="day-section">
                    <div class="day-label">
                        <i class="fas fa-calendar-alt"></i> HARI INI <i class="fas fa-calendar-alt"></i>
                    </div>

                </div>
                <div class="date-section">
                    <div class="date-box">
                        <div class="date-number" id="dateNumber">00</div>
                        <div class="date-month" id="dateMonth">Bulan</div>
                    </div>
                    <div class="date-year" id="dateYear">0000</div>
                </div>
            </div>

            <div class="web-section">
                <div class="web-header">
                    <i class="fas fa-globe"></i> WEB BY ZEFF
                    <i class="fas fa-code"></i>
                </div>
                <div id="linksContainer" class="links-container">
                    <div class="loading-links">
                        <i class="fas fa-spinner fa-pulse"></i>
                        Memuat link web...
                    </div>
                </div>
                <div class="info-text">
                    <i class="fas fa-info-circle"></i> Klik tombol untuk membuka link web buatan Zeff
                </div>
            </div>

            <div class="footer">
                <a href="https://github.com/username_kamu" target="_blank" class="footer-link">
                    <i class="fab fa-github"></i> GitHub
                </a>
            </div>
        </div>
    </div>

    <script>
        // ========== VIDEO PREVIEW CONTROL ==========
        const video = document.getElementById('profileVideo');
        const videoSection = document.getElementById('videoSection');
        const playIcon = document.getElementById('playIcon');
        const soundBtn = document.getElementById('soundBtn');
        const soundIcon = document.getElementById('soundIcon');
        const soundText = document.getElementById('soundText');
        const mutedIndicator = document.getElementById('mutedIndicator');

        const autoPlayPreview = () => {
            video.play().then(() => {
                playIcon.className = 'fas fa-pause';
            }).catch(() => {
                video.muted = true;
                video.play().then(() => {
                    playIcon.className = 'fas fa-pause';
                    mutedIndicator.style.display = 'flex';
                    soundIcon.className = 'fas fa-volume-mute';
                    soundText.textContent = 'Aktifkan Suara';
                }).catch(() => {});
            });
        };

        autoPlayPreview();

        function enableSound() {
            video.muted = false;
            soundIcon.className = 'fas fa-volume-up';
            soundText.textContent = 'Suara Aktif';
            mutedIndicator.style.display = 'none';
            soundBtn.style.background = '#7c3aed';
            soundBtn.style.borderColor = '#c084fc';
            soundBtn.style.color = 'white';
            localStorage.setItem('videoSoundEnabled', 'true');
        }

        function disableSound() {
            video.muted = true;
            soundIcon.className = 'fas fa-volume-mute';
            soundText.textContent = 'Aktifkan Suara';
            mutedIndicator.style.display = 'flex';
            soundBtn.style.background = 'rgba(0, 0, 0, 0.65)';
            soundBtn.style.borderColor = 'rgba(124, 58, 237, 0.6)';
            soundBtn.style.color = '#c4b5fd';
            localStorage.setItem('videoSoundEnabled', 'false');
        }

        soundBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            video.muted ? enableSound() : disableSound();
        });

        const savedSoundSetting = localStorage.getItem('videoSoundEnabled');
        savedSoundSetting === 'false' ? disableSound() : enableSound();

        videoSection.addEventListener('click', (e) => {
            if (e.target.closest('.sound-btn')) return;
            if (video.paused) {
                video.play();
                playIcon.className = 'fas fa-pause';
            } else {
                video.pause();
                playIcon.className = 'fas fa-play';
            }
        });

        video.addEventListener('ended', () => {
            video.currentTime = 0;
            video.play();
        });

        // ========== UPDATE TANGGAL (setiap menit cukup, lebih ringan) ==========
        function updateDateTime() {
            const now = new Date();
            const days = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
            const months = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni',
                            'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];

            document.getElementById('dayName').textContent = days[now.getDay()];
            document.getElementById('dateNumber').textContent = now.getDate().toString().padStart(2, '0');
            document.getElementById('dateMonth').textContent = months[now.getMonth()];
            document.getElementById('dateYear').textContent = now.getFullYear();
        }
        updateDateTime();
        setInterval(updateDateTime, 60000);

        // ========== MEMBACA data.txt DENGAN FORMAT NAMA|URL ==========
        async function loadLinks() {
            const container = document.getElementById('linksContainer');
            try {
                const timestamp = new Date().getTime();
                const response = await fetch(`data.txt?t=${timestamp}`);
                if (!response.ok) throw new Error('File data.txt tidak ditemukan');

                const text = await response.text();
                const lines = text.split(/\r?\n/);
                const links = [];

                for (let line of lines) {
                    line = line.trim();
                    if (line === '' || line.startsWith('#')) continue;

                    const separatorIndex = line.indexOf('|');
                    if (separatorIndex === -1) continue;

                    const name = line.substring(0, separatorIndex).trim();
                    let url = line.substring(separatorIndex + 1).trim();

                    if (name && url) {
                        if (!url.startsWith('http://') && !url.startsWith('https://')) {
                            url = 'https://' + url;
                        }
                        links.push({ name, url });
                    }
                }

                if (links.length === 0) {
                    container.innerHTML = `
                        <div class="error-links">
                            <i class="fas fa-exclamation-triangle"></i>
                            <p>Belum ada link web</p>
                            <small style="display:block;margin-top:8px;">Format data.txt: Nama Tombol|URL</small>
                            <small style="display:block;margin-top:4px;">Contoh: YouTube|https://youtube.com/@zeff</small>
                        </div>
                    `;
                    return;
                }

                const icons = ['fa-globe', 'fa-code', 'fa-window-maximize', 'fa-laptop-code',
                              'fa-file-code', 'fa-server', 'fa-cloud', 'fa-rocket', 'fa-star',
                              'fa-fire', 'fa-crown', 'fa-gem', 'fa-infinity'];

                const frag = document.createDocumentFragment();

                links.forEach((link, index) => {
                    let iconClass = 'fas ' + icons[index % icons.length];
                    const lowerName = link.name.toLowerCase();
                    if (lowerName.includes('youtube') || lowerName.includes('yt')) iconClass = 'fab fa-youtube';
                    else if (lowerName.includes('instagram') || lowerName.includes('ig')) iconClass = 'fab fa-instagram';
                    else if (lowerName.includes('tiktok')) iconClass = 'fab fa-tiktok';
                    else if (lowerName.includes('twitter')) iconClass = 'fab fa-twitter';
                    else if (lowerName.includes('facebook')) iconClass = 'fab fa-facebook';
                    else if (lowerName.includes('whatsapp')) iconClass = 'fab fa-whatsapp';
                    else if (lowerName.includes('telegram')) iconClass = 'fab fa-telegram';
                    else if (lowerName.includes('github')) iconClass = 'fab fa-github';
                    else if (lowerName.includes('spotify')) iconClass = 'fab fa-spotify';

                    const button = document.createElement('a');
                    button.href = link.url;
                    button.target = '_blank';
                    button.rel = 'noopener noreferrer';
                    button.className = 'web-btn';
                    button.innerHTML = `
                        <div class="btn-left">
                            <i class="${iconClass}"></i>
                            <span>${escapeHtml(link.name)}</span>
                        </div>
                        <div class="btn-arrow">
                            <i class="fas fa-arrow-right"></i>
                        </div>
                    `;
                    frag.appendChild(button);
                });

                container.innerHTML = '';
                container.appendChild(frag);

            } catch (error) {
                container.innerHTML = `
                    <div class="error-links">
                        <i class="fas fa-file-alt"></i>
                        <p>Gagal memuat link web</p>
                        <small style="display:block;margin-top:8px;">Pastikan file <strong>data.txt</strong> tersedia</small>
                        <small style="display:block;margin-top:4px;">Format: Nama Tombol|URL</small>
                    </div>
                `;
            }
        }

        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        loadLinks();
        setInterval(loadLinks, 60000);
    </script>
</body>
</html>
