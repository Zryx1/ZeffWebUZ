<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>The Vortex | Zeff</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            background: #0a0612;
        }

        .bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
            filter: brightness(0.4) saturate(1.2);
            opacity: 0.95;
        }

        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(15,11,26,0.65) 0%, rgba(8,5,16,0.9) 100%);
            z-index: 1;
            backdrop-filter: blur(2px);
        }

        .container {
            width: 100%;
            max-width: 550px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        .profile-card {
            background: rgba(19, 17, 28, 0.7);
            backdrop-filter: blur(16px);
            border-radius: 48px;
            padding: 32px 24px;
            border: 1px solid rgba(124, 58, 237, 0.5);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(124, 58, 237, 0.2) inset;
            transition: transform 0.2s ease;
        }

        .profile-card:hover {
            border-color: rgba(124, 58, 237, 0.8);
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(124, 58, 237, 0.4) inset;
        }

        .video-section {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000000aa;
            border-radius: 28px;
            overflow: hidden;
            margin-bottom: 24px;
            border: 2px solid #7c3aed;
            position: relative;
            cursor: pointer;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.5);
            transition: all 0.2s;
        }

        .video-section:hover {
            border-color: #a855f7;
            transform: scale(1.01);
        }

        .video-section video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s ease;
            pointer-events: none;
            backdrop-filter: blur(4px);
        }

        .video-section:hover .video-overlay {
            opacity: 1;
        }

        .video-overlay i {
            color: white;
            font-size: 2.8rem;
            text-shadow: 0 2px 8px black;
        }

        .sound-btn {
            position: absolute;
            bottom: 12px;
            right: 12px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(124, 58, 237, 0.6);
            border-radius: 40px;
            padding: 8px 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            z-index: 10;
            transition: all 0.2s ease;
            font-size: 0.8rem;
            font-weight: 500;
            color: #c4b5fd;
        }

        .sound-btn:hover {
            background: #7c3aed;
            border-color: #c084fc;
            color: white;
            transform: scale(1.02);
        }

        .sound-btn i {
            font-size: 0.9rem;
        }

        .sound-btn span {
            font-size: 0.7rem;
            letter-spacing: 0.5px;
        }

        .muted-indicator {
            position: absolute;
            bottom: 12px;
            left: 12px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 20px;
            padding: 4px 8px;
            font-size: 0.6rem;
            color: #f87171;
            display: flex;
            align-items: center;
            gap: 4px;
            pointer-events: none;
        }

        .profile-photo-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        .profile-photo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid #7c3aed;
            box-shadow: 0 0 30px rgba(124, 58, 237, 0.6), 0 5px 15px rgba(0,0,0,0.3);
            transition: transform 0.2s;
            background: #1e1a2f;
        }

        .profile-photo:hover {
            transform: scale(1.02);
            border-color: #a78bfa;
        }

        .profile-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-info {
            text-align: center;
            margin-bottom: 20px;
        }

        .name {
            color: white;
            font-size: 2.3rem;
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
            background: linear-gradient(135deg, #fff, #c4b5fd);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .bio {
            color: #ddd6fe;
            font-size: 1.05rem;
            line-height: 1.5;
            max-width: 350px;
            margin: 0 auto;
            font-weight: 500;
            background: rgba(0,0,0,0.3);
            display: inline-block;
            padding: 6px 18px;
            border-radius: 60px;
            backdrop-filter: blur(4px);
        }

        .bio i {
            color: #c084fc;
            margin: 0 6px;
        }

        .info-ai {
            text-align: center;
            margin-bottom: 28px;
            padding: 10px 16px;
        }

        .info-badge {
            background: linear-gradient(135deg, rgba(124, 58, 237, 0.2), rgba(168, 85, 247, 0.2));
            border: 1px solid rgba(124, 58, 237, 0.4);
            border-radius: 40px;
            padding: 10px 20px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(8px);
            transition: all 0.2s;
        }

        .info-badge:hover {
            border-color: #7c3aed;
            background: rgba(124, 58, 237, 0.3);
            transform: scale(1.02);
        }

        .info-badge i {
            font-size: 1.1rem;
            color: #c084fc;
        }

        .info-badge span {
            font-size: 0.85rem;
            color: #c4b5fd;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        .date-menu {
            background: rgba(26, 23, 40, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(124, 58, 237, 0.5);
            border-radius: 32px;
            padding: 24px;
            margin-bottom: 28px;
            text-align: center;
            transition: all 0.2s;
        }

        .date-menu:hover {
            border-color: #7c3aed;
            background: rgba(26, 23, 40, 0.8);
        }

        .day-section {
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(124, 58, 237, 0.4);
        }

        .day-label {
            color: #c084fc;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-weight: 600;
        }

        .day-label i {
            font-size: 1rem;
        }

        .day-name {
            color: white;
            font-size: 2.6rem;
            font-weight: 800;
            line-height: 1.2;
            text-shadow: 0 1px 3px black;
            letter-spacing: -0.5px;
        }

        .date-section {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .date-box {
            background: rgba(19, 17, 28, 0.8);
            border-radius: 28px;
            padding: 18px 20px;
            min-width: 110px;
            border: 1px solid #3b2c5c;
            backdrop-filter: blur(4px);
        }

        .date-number {
            color: #c084fc;
            font-size: 2.3rem;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 6px;
        }

        .date-month {
            color: #cbd5e6;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 500;
        }

        .date-year {
            color: white;
            font-size: 1.8rem;
            font-weight: 700;
            padding: 8px 18px;
            border-radius: 40px;
            background: rgba(0,0,0,0.2);
        }

        .web-section {
            background: rgba(26, 23, 40, 0.65);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(124, 58, 237, 0.5);
            border-radius: 32px;
            padding: 24px 20px;
            margin-bottom: 28px;
            transition: all 0.2s;
        }

        .web-section:hover {
            border-color: #7c3aed;
            background: rgba(26, 23, 40, 0.8);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .web-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: #c084fc;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .web-header i {
            font-size: 1rem;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .web-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(105deg, rgba(124, 58, 237, 0.9) 0%, rgba(168, 85, 247, 0.9) 100%);
            border: none;
            padding: 14px 20px;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            color: white;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 4px 12px rgba(124, 58, 237, 0.3);
            text-decoration: none;
            width: 100%;
        }

        .web-btn .btn-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }

        .web-btn .btn-left i {
            font-size: 1.2rem;
            width: 24px;
            text-align: center;
        }

        .web-btn .btn-left span {
            font-weight: 600;
            word-break: break-word;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .web-btn .btn-arrow {
            opacity: 0.7;
            transition: transform 0.2s;
            font-size: 0.9rem;
        }

        .web-btn:hover {
            transform: translateX(5px);
            background: linear-gradient(105deg, #8b5cf6, #c084fc);
            box-shadow: 0 8px 20px rgba(124, 58, 237, 0.5);
        }

        .web-btn:hover .btn-arrow {
            transform: translateX(4px);
            opacity: 1;
        }

        .loading-links {
            text-align: center;
            padding: 30px;
            color: #b9b0d4;
        }

        .loading-links i {
            font-size: 2rem;
            margin-bottom: 10px;
            display: block;
        }

        .error-links {
            text-align: center;
            padding: 20px;
            color: #f87171;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
        }

        .info-text {
            font-size: 0.7rem;
            color: #9b8ec7;
            text-align: center;
            margin-top: 15px;
            padding-top: 12px;
            border-top: 1px solid rgba(124, 58, 237, 0.3);
        }

        .footer {
            display: flex;
            justify-content: center;
            margin-top: 8px;
            padding-top: 10px;
            border-top: 1px solid rgba(124, 58, 237, 0.4);
        }

        .footer-link {
            color: #c4b5fd;
            font-size: 1rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(0,0,0,0.3);
            padding: 8px 22px;
            border-radius: 40px;
            transition: all 0.2s;
            font-weight: 500;
            backdrop-filter: blur(8px);
            border: 1px solid #4a3a7a;
        }

        .footer-link:hover {
            color: white;
            background: #7c3aedcc;
            border-color: #c084fc;
            transform: translateY(-2px);
            gap: 14px;
        }

        @media (max-width: 520px) {
            .profile-card {
                padding: 24px 18px;
            }
            .name {
                font-size: 1.9rem;
            }
            .bio {
                font-size: 0.9rem;
            }
            .profile-photo {
                width: 95px;
                height: 95px;
            }
            .day-name {
                font-size: 2rem;
            }
            .date-number {
                font-size: 1.8rem;
            }
            .date-year {
                font-size: 1.3rem;
                padding: 5px 12px;
            }
            .date-box {
                padding: 12px 14px;
                min-width: 85px;
            }
            .web-btn {
                padding: 12px 16px;
                font-size: 0.9rem;
            }
            .web-btn .btn-left span {
                font-size: 0.85rem;
            }
            .info-badge span {
                font-size: 0.75rem;
            }
            .sound-btn {
                padding: 5px 10px;
            }
            .sound-btn span {
                display: none;
            }
        }

        video::-webkit-media-controls {
            display: none !important;
        }
        video {
            pointer-events: none;
        }
        .video-section video {
            pointer-events: none;
        }
    </style>
</head>
<body>

    <video class="bg-video" autoplay loop muted playsinline preload="auto">

                    𝙿𝚛𝚘𝚓𝚎𝚌𝚝 𝙱𝚢 𝚉𝚎𝚏𝚏

                </p>
            </div>

            <div class="info-ai">
                <div class="info-badge">
                    <i class="fas fa-moon"></i>
                    <span>Zeff Hanya Pengguna AI Biasa - Dia Hanya Memikirkan Ide</span>
                    <i class="fas fa-moon"></i>
                </div>
            </div>

            <div class="date-menu">
                <div class="day-section">
                    <div class="day-label">
                        <i class="fas fa-calendar-alt"></i> HARI INI <i class="fas fa-calendar-alt"></i>
                    </div>
                    <div class="day-name" id="dayName">Loading...</div>
                </div>
                <div class="date-section">
                    <div class="date-box">
                        <div class="date-number" id="dateNumber">00</div>
                        <div class="date-month" id="dateMonth">Bulan</div>
                    </div>
                    <div class="date-year" id="dateYear">0000</div>
                </div>
            </div>

            <div class="web-section">
                <div class="web-header">

                        Memuat link web...
                    </div>

                </div>

            <div class="footer">

                </a>

        </div>
    </div>

    <script>
        // ========== VIDEO BACKGROUND ==========
        const bgVideo = document.querySelector('.bg-video');
        if (bgVideo) {
            bgVideo.play().catch(() => {});
            bgVideo.addEventListener('error', () => {
                const overlayDiv = document.querySelector('.bg-overlay');
                if(overlayDiv) overlayDiv.style.background = "radial-gradient(circle at center, #0f0b1a, #05020c)";
            });
        }

        // ========== VIDEO PREVIEW CONTROL + SOUND BUTTON ==========
        const video = document.getElementById('profileVideo');
        const videoSection = document.getElementById('videoSection');
        const playIcon = document.getElementById('playIcon');
        const soundBtn = document.getElementById('soundBtn');
        const soundIcon = document.getElementById('soundIcon');
        const soundText = document.getElementById('soundText');
        const mutedIndicator = document.getElementById('mutedIndicator');

        const autoPlayPreview = () => {
            video.play().then(() => {
                playIcon.className = 'fas fa-pause';
            }).catch(() => {
                playIcon.className = 'fas fa-play';
            });
        };
        autoPlayPreview();

        videoSection.addEventListener('click', (e) => {
            if (e.target.closest('.sound-btn')) return;
            e.stopPropagation();
            if (video.paused) {
                video.play();
                playIcon.className = 'fas fa-pause';
            } else {
                video.pause();
                playIcon.className = 'fas fa-play';
            }
        });

        video.addEventListener('ended', () => {
            playIcon.className = 'fas fa-play';
        });

        video.addEventListener('error', () => {
            videoSection.innerHTML = `
                <div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#1a1a2e;color:#aaa;flex-direction:column;gap:8px;">
                    <i class="fas fa-video-slash" style="font-size:2rem;"></i>
                    <span style="font-size:12px;">video unavailable</span>
                </div>
            `;
        });

        function enableSound() {
            video.muted = false;
            soundIcon.className = 'fas fa-volume-up';
            soundText.textContent = 'Suara Aktif';
            if (mutedIndicator) mutedIndicator.style.display = 'none';
            soundBtn.style.background = '#7c3aed';
            soundBtn.style.borderColor = '#c084fc';
            soundBtn.style.color = 'white';
            localStorage.setItem('videoSoundEnabled', 'true');
        }

        function disableSound() {
            video.muted = true;
            soundIcon.className = 'fas fa-volume-mute';
            soundText.textContent = 'Aktifkan Suara';
            if (mutedIndicator) mutedIndicator.style.display = 'flex';
            soundBtn.style.background = 'rgba(0, 0, 0, 0.7)';
            soundBtn.style.borderColor = 'rgba(124, 58, 237, 0.6)';
            soundBtn.style.color = '#c4b5fd';
            localStorage.setItem('videoSoundEnabled', 'false');
        }

        soundBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (video.muted) {
                enableSound();
            } else {
                disableSound();
            }
        });

        const soundEnabled = localStorage.getItem('videoSoundEnabled');
        if (soundEnabled === 'true') {
            enableSound();
        } else {
            disableSound();
        }

        // ========== UPDATE TANGGAL ==========
        function updateDateTime() {
            const now = new Date();
            const days = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
            const months = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni',
                            'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
            
            const dayName = days[now.getDay()];
            const dateNumber = now.getDate().toString().padStart(2, '0');
            const monthName = months[now.getMonth()];
            const year = now.getFullYear();
            
            document.getElementById('dayName').textContent = dayName;
            document.getElementById('dateNumber').textContent = dateNumber;
            document.getElementById('dateMonth').textContent = monthName;
            document.getElementById('dateYear').textContent = year;
        }
        updateDateTime();
        setInterval(updateDateTime, 1000);

        // ========== FUNGSI MEMBACA data.txt DENGAN FORMAT NAMA|URL ==========
        async function loadLinks() {
            const container = document.getElementById('linksContainer');
            
            try {
                const timestamp = new Date().getTime();
                const response = await fetch(`data.txt?t=${timestamp}`);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status} - File data.txt tidak ditemukan`);
                }
                
                const text = await response.text();
                const lines = text.split(/\r?\n/);
                const links = [];
                
                for (let line of lines) {
                    line = line.trim();
                    if (line === '' || line.startsWith('#')) continue;
                    
                    // Format: Nama Tombol|URL
                    const separatorIndex = line.indexOf('|');
                    
                    if (separatorIndex === -1) {
                        // Jika tidak ada separator, anggap ini hanya URL, gunakan nama default
                        let url = line;
                        if (!url.startsWith('http://') && !url.startsWith('https://')) {
                            url = 'https://' + url;
                        }
                        if (url.length > 5) {
                            links.push({ name: `Web ${links.length + 1}`, url: url });
                        }
                    } else {
                        const name = line.substring(0, separatorIndex).trim();
                        let url = line.substring(separatorIndex + 1).trim();
                        
                        if (name && url) {
                            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                                url = 'https://' + url;
                            }
                            links.push({ name: name, url: url });
                        }
                    }
                }
                
                if (links.length === 0) {
                    container.innerHTML = `
                        <div class="error-links">
                            <i class="fas fa-exclamation-triangle"></i>
                            <p>Belum ada link web</p>
                            <small style="display:block;margin-top:8px;">Silakan isi file <strong>data.txt</strong> dengan format:</small>
                            <small style="display:block;margin-top:8px;color:#a78bfa;">
                                <i class="fas fa-info-circle"></i> Nama Web|https://linkweb.com
                            </small>
                            <small style="display:block;margin-top:5px;color:#a78bfa;">
                                Contoh: Web HTML|https://contoh.com
                            </small>
                        </div>
                    `;
                    return;
                }
                
                // Kumpulan icon untuk variasi
                const icons = ['fa-globe', 'fa-code', 'fa-window-maximize', 'fa-browser', 'fa-laptop-code',
                              'fa-file-code', 'fa-server', 'fa-cloud', 'fa-database', 'fa-network-wired',
                              'fa-folder-open', 'fa-link', 'fa-paper-plane', 'fa-rocket', 'fa-star',
                              'fa-fire', 'fa-bolt', 'fa-crown', 'fa-gem', 'fa-meteor'];
                
                container.innerHTML = '';
                
                links.forEach((item, index) => {
                    // Pilih icon berdasarkan kata kunci di nama
                    let iconClass = icons[index % icons.length];
                    const lowerName = item.name.toLowerCase();
                    
                    if (lowerName.includes('html')) iconClass = 'fa-code';
                    else if (lowerName.includes('css')) iconClass = 'fa-paintbrush';
                    else if (lowerName.includes('js') || lowerName.includes('javascript')) iconClass = 'fa-js';
                    else if (lowerName.includes('react')) iconClass = 'fa-atom';
                    else if (lowerName.includes('vue')) iconClass = 'fa-vuejs';
                    else if (lowerName.includes('portfolio')) iconClass = 'fa-briefcase';
                    else if (lowerName.includes('blog')) iconClass = 'fa-blog';
                    else if (lowerName.includes('game')) iconClass = 'fa-gamepad';
                    else if (lowerName.includes('api')) iconClass = 'fa-plug';
                    else if (lowerName.includes('database')) iconClass = 'fa-database';
                    else if (lowerName.includes('ai')) iconClass = 'fa-microchip';
                    
                    const button = document.createElement('a');
                    button.href = item.url;
                    button.target = '_blank';
                    button.rel = 'noopener noreferrer';
                    button.className = 'web-btn';
                    button.innerHTML = `
                        <div class="btn-left">
                            <i class="fas ${iconClass}"></i>
                            <span>${escapeHtml(item.name)}</span>
                        </div>
                        <div class="btn-arrow">
                            <i class="fas fa-arrow-right"></i>
                        </div>
                    `;
                    
                    container.appendChild(button);
                });
                
                console.log(`Berhasil memuat ${links.length} link web dari data.txt`);
                
            } catch (error) {
                console.error('Gagal memuat data.txt:', error);
                container.innerHTML = `
                    <div class="error-links">
                        <i class="fas fa-file-alt"></i>
                        <p>Gagal memuat link web</p>
                        <small style="display:block;margin-top:8px;">
                            Pastikan file <strong>data.txt</strong> tersedia di folder yang sama
                        </small>
                        <small style="display:block;margin-top:12px;color:#a78bfa;">
                            <i class="fas fa-info-circle"></i> Format: Nama Web|https://linkweb.com
                        </small>
                        <small style="display:block;margin-top:5px;color:#a78bfa;">
                            Contoh: Web HTML|https://contoh.com
                        </small>
                    </div>
                `;
            }
        }
        
        // Helper untuk menghindari XSS
        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        loadLinks();
        setInterval(loadLinks, 30000);
    </script>
</body>
</html>
